name: ghras_app
description: "A new Flutter project."
publish_to: "none" # يمنع نشر الحزمة بالخطأ على pub.dev


version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  path_provider: ^2.1.3
  flutter_pdfview: ^1.3.2
  
  # جديد
  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # جديد
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/mosaic/
    - assets/book/

  # إذا أردتِ إضافة صور (Assets) مستقبلاً، يمكنكِ تفعيل الأسطر بالأسفل بحذف علامة (#)
  # assets:
